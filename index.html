<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crime Scene — First Person</title>
<!-- Favicon — đặt file ảnh cùng thư mục với index.html trên GitHub -->
<link rel="icon" type="image/png" href="favicon-16x16.png">
<link rel="apple-touch-icon" href="favicon-16x16.png">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { overflow:hidden; background:#111; font-family:'Segoe UI',sans-serif; cursor:crosshair; }
canvas { display:block; }

/* ── Loading ── */
#loading {
  position:fixed; inset:0; background:#0d0d12;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  z-index:200; transition:opacity 1s; padding:20px;
}
#loading h1 { color:#cc3333; font-size:clamp(1.2rem,5vw,2rem); letter-spacing:0.2em; text-transform:uppercase; margin-bottom:6px; text-shadow:0 0 30px rgba(200,50,50,0.5); text-align:center; }
#loading p  { color:#555; font-size:clamp(0.7rem,2.5vw,0.8rem); letter-spacing:0.1em; margin-bottom:30px; text-align:center; }
#bar { width:min(260px,80vw); height:3px; background:#1a1a2a; border-radius:2px; overflow:hidden; }
#bar-fill { height:100%; width:0%; background:linear-gradient(90deg,#cc3333,#ff6666); transition:width 0.2s; }
#bar-txt { color:#555; margin-top:10px; font-size:0.72rem; text-align:center; }

/* ── Crosshair ── */
#xhair {
  position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
  width:16px; height:16px; pointer-events:none; z-index:50;
}
#xhair::before,#xhair::after { content:''; position:absolute; background:rgba(255,80,80,0.95); border-radius:1px; }
#xhair::before { width:2px; height:100%; left:50%; transform:translateX(-50%); }
#xhair::after  { width:100%; height:2px; top:50%; transform:translateY(-50%); }

/* ── Badge (top-left) ── */
#badge {
  position:fixed; top:12px; left:12px; z-index:50; pointer-events:none;
  background:rgba(0,0,0,0.75); border:1px solid rgba(180,30,30,0.4);
  border-radius:10px; padding:6px 10px; backdrop-filter:blur(10px);
}
#badge b { color:#cc3333; font-size:clamp(9px,2.5vw,12px); letter-spacing:0.1em; text-transform:uppercase; display:block; }
#badge small { color:#555; font-size:clamp(8px,2vw,10px); }

/* ── Hint (top-center) — ẩn trên mobile nhỏ ── */
#hint {
  position:fixed; top:12px; left:50%; transform:translateX(-50%); z-index:50;
  background:rgba(0,0,0,0.75); color:rgba(255,200,200,0.9);
  padding:6px 14px; border-radius:20px; font-size:clamp(9px,2.2vw,11px);
  border:1px solid rgba(180,50,50,0.3); backdrop-filter:blur(8px);
  pointer-events:none; transition:opacity 1.5s;
  white-space:nowrap; max-width:calc(100vw - 160px); overflow:hidden; text-overflow:ellipsis;
}

/* ── D-pad — hình thập tự chuẩn ── */
#dpad {
  position:fixed; bottom:20px; left:16px;
  display:grid;
  grid-template-columns:repeat(3, var(--btn-size));
  grid-template-rows:repeat(3, var(--btn-size));
  gap:4px; z-index:100;
  --btn-size: clamp(48px, 13vw, 62px);
  user-select:none;
  -webkit-user-select:none;
  -moz-user-select:none;
  -ms-user-select:none;
}
/* Nút Jump riêng — góc phải bên cạnh d-pad */
#jump-wrap {
  position:fixed; bottom:20px; left:calc(16px + var(--dpad-w) + 10px);
  display:flex; align-items:flex-end;
  z-index:100;
  --dpad-size: clamp(48px, 13vw, 62px);
  --dpad-w: calc(var(--dpad-size) * 3 + 8px);
}
.btn {
  /* Kích thước do grid cha quyết định — không cần set width/height */
  background:rgba(0,0,0,0.6); border:1px solid rgba(200,60,60,0.4);
  border-radius:12px; color:rgba(255,160,160,0.9);
  font-size:clamp(16px,4.5vw,22px);
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  user-select:none;
  -webkit-user-select:none;
  -moz-user-select:none;
  -ms-user-select:none;
  -webkit-tap-highlight-color:transparent;
  -webkit-touch-callout:none;
  backdrop-filter:blur(6px); transition:background 0.1s,transform 0.08s;
  touch-action:none;
  /* Đảm bảo tỉ lệ vuông */
  aspect-ratio:1/1;
}
.btn:active,.btn.on { background:rgba(200,50,50,0.5); transform:scale(0.91); }
.btn.empty { visibility:hidden; pointer-events:none; }
.btn-center {
  background:rgba(255,255,255,0.06);
  border-color:rgba(200,60,60,0.25);
  color:rgba(255,160,160,0.5);
  font-size:clamp(12px,3vw,16px);
  pointer-events:auto; /* nút giữa = tương tác */
  cursor:pointer;
}
.btn-center:active, .btn-center.on {
  background:rgba(200,50,50,0.45) !important;
  transform:scale(0.91);
}
/* Nút jump độc lập */
#btn-jump {
  width:clamp(48px,13vw,62px); height:clamp(48px,13vw,62px);
  background:rgba(0,0,0,0.6);
  border:1px solid rgba(80,140,255,0.5);
  border-radius:12px; color:rgba(160,200,255,0.95);
  font-size:clamp(16px,4.5vw,22px);
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  user-select:none; -webkit-user-select:none;
  -webkit-tap-highlight-color:transparent; -webkit-touch-callout:none;
  backdrop-filter:blur(6px); transition:background 0.1s,transform 0.08s;
  touch-action:none; aspect-ratio:1/1;
}
#btn-jump:active, #btn-jump.on { background:rgba(50,80,200,0.5); transform:scale(0.91); }

/* ── Controls panel — phải ── */
#ctrl {
  position:fixed; bottom:20px; right:12px;
  display:flex; flex-direction:column; gap:7px; z-index:100;
  align-items:flex-end;
}
.cbtn {
  background:rgba(0,0,0,0.7); border:1px solid rgba(200,60,60,0.35);
  color:#cc6666; font-size:clamp(10px,2.5vw,12px); padding:clamp(6px,2vw,9px) clamp(9px,3vw,13px);
  border-radius:9px; cursor:pointer; backdrop-filter:blur(8px); text-align:center;
  -webkit-tap-highlight-color:transparent; white-space:nowrap;
}
.cbtn:active, .cbtn:hover { background:rgba(160,30,30,0.35); }

/* ── Nút tương tác E — ẨN hoàn toàn, thay bằng nút ⊙ ── */
#btn-interact { display:none !important; }

/* ── Inspect label ── */
#inspect-label {
  position:fixed; left:50%; transform:translateX(-50%);
  background:rgba(0,0,0,0.75); color:#fff; padding:6px 16px;
  border-radius:20px; font-size:clamp(10px,2.5vw,12px); letter-spacing:0.05em;
  border:1px solid rgba(255,255,255,0.15); backdrop-filter:blur(8px);
  pointer-events:none; z-index:50; display:none;
  max-width:70vw; text-align:center; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}

/* ── Interact prompt ── */
#interact-prompt {
  position:fixed; left:50%; transform:translateX(-50%);
  background:rgba(200,50,50,0.85); color:#fff; padding:7px 20px;
  border-radius:20px; font-size:clamp(10px,2.5vw,12px); font-weight:bold; letter-spacing:0.08em;
  pointer-events:none; z-index:50; display:none; white-space:nowrap;
}

/* ── Popup tương tác ── */
#interact-popup {
  position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
  background:rgba(10,10,20,0.95); color:#eee;
  padding:clamp(16px,4vw,24px) clamp(16px,5vw,28px);
  border-radius:14px; font-size:clamp(12px,3vw,13px); line-height:1.7;
  border:1px solid rgba(200,50,50,0.4); backdrop-filter:blur(12px);
  pointer-events:auto; z-index:60; display:none;
  width:min(340px, 88vw);
  text-align:center; box-shadow:0 0 40px rgba(0,0,0,0.6);
}
#popup-title { color:#ff8888; font-size:clamp(13px,3.5vw,15px); font-weight:bold; margin-bottom:8px; }
#popup-close-hint { margin-top:12px; color:#555; font-size:clamp(10px,2.5vw,11px); }

/* ── VR Button ── */
#vr-btn {
  position:fixed; right:12px;
  width:clamp(44px,12vw,54px); height:clamp(44px,12vw,54px);
  background:rgba(0,0,0,0.7); border:1px solid rgba(100,160,255,0.45);
  border-radius:50%; cursor:pointer; z-index:101;
  display:flex; align-items:center; justify-content:center;
  backdrop-filter:blur(8px); transition:background 0.15s, transform 0.1s;
  -webkit-tap-highlight-color:transparent;
  /* bottom được set bởi JS sau khi tính chiều cao #ctrl */
  bottom: 100px;
}
#vr-btn:hover, #vr-btn:active { background:rgba(60,100,200,0.45); transform:scale(0.92); }
#vr-btn svg { width:60%; height:60%; }

/* ── QR Popup ── */
#qr-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,0.6);
  z-index:150; display:none; align-items:center; justify-content:center;
  backdrop-filter:blur(4px);
}
#qr-overlay.open { display:flex; }
#qr-card {
  background:rgba(8,8,18,0.97); border:1px solid rgba(80,140,255,0.35);
  border-radius:18px; padding:clamp(18px,5vw,28px) clamp(18px,5vw,28px);
  text-align:center; width:min(300px,88vw);
  box-shadow:0 0 50px rgba(0,0,80,0.5); position:relative;
  animation: qrPop 0.22s cubic-bezier(.34,1.56,.64,1);
}
@keyframes qrPop { from { opacity:0; transform:scale(0.82); } to { opacity:1; transform:scale(1); } }
#qr-card h3 {
  color:#88aaff; font-size:clamp(12px,3vw,14px); letter-spacing:0.15em;
  text-transform:uppercase; margin-bottom:14px;
}
#qr-img-wrap {
  background:#fff; border-radius:10px; padding:10px;
  display:inline-block; margin-bottom:16px;
}
#qr-img-wrap img {
  display:block; width:clamp(140px,50vw,180px); height:auto;
  border-radius:4px;
}
#qr-actions { display:flex; gap:10px; justify-content:center; flex-wrap:wrap; }
.qr-action-btn {
  flex:1; min-width:90px; max-width:130px;
  padding:9px 14px; border-radius:10px; font-size:clamp(11px,2.8vw,13px);
  font-weight:bold; cursor:pointer; border:none; letter-spacing:0.05em;
  transition:opacity 0.15s, transform 0.1s; -webkit-tap-highlight-color:transparent;
}
.qr-action-btn:active { transform:scale(0.93); opacity:0.8; }
#qr-copy-btn { background:rgba(60,80,180,0.25); border:1px solid rgba(80,140,255,0.4); color:#88aaff; }
#qr-open-btn { background:rgba(80,140,255,0.2); border:1px solid rgba(80,140,255,0.5); color:#cce0ff; }
#qr-copy-btn:hover { background:rgba(60,80,180,0.4); }
#qr-open-btn:hover { background:rgba(80,140,255,0.35); }
#qr-close-btn {
  position:absolute; top:10px; right:12px;
  background:none; border:none; color:#445; font-size:18px;
  cursor:pointer; line-height:1; padding:2px 5px; border-radius:6px;
}
#qr-close-btn:hover { color:#88aaff; }
#qr-copied-msg {
  font-size:11px; color:#66cc88; margin-top:8px; height:14px;
  transition:opacity 0.4s;
}

/* ── Corner decorations ── */
.corner { position:fixed; width:16px; height:16px; border-color:rgba(200,30,30,0.45); border-style:solid; pointer-events:none; z-index:45; }
.corner.tl{top:8px;left:8px;border-width:2px 0 0 2px}
.corner.tr{top:8px;right:8px;border-width:2px 2px 0 0}
.corner.bl{bottom:8px;left:8px;border-width:0 0 2px 2px}
.corner.br{bottom:8px;right:8px;border-width:0 2px 2px 0}

/* ════════════════════════════════════════
   RESPONSIVE — Mobile (≤ 480px)
════════════════════════════════════════ */
@media (max-width:480px) {
  /* Ẩn hint trên màn hình nhỏ */
  #hint { display:none !important; }
  /* Hiện nút E */
  /* Popup chiếm rộng hơn */
  #interact-popup { width:92vw; }
}

/* ════════════════════════════════════════
   RESPONSIVE — Tablet nhỏ (481–767px)
════════════════════════════════════════ */
@media (min-width:481px) and (max-width:767px) {
  #hint { font-size:10px; max-width:calc(100vw - 200px); }
}

/* ════════════════════════════════════════
   Desktop / màn hình lớn
════════════════════════════════════════ */
@media (min-width:768px) {
  #dpad { --btn-size:54px; }
  .cbtn { font-size:11px; }
}
</style>
</head>
<body>
<div id="loading">
  <h1>☠ Crime Scene</h1>
  <p>First Person Explorer</p>
  <div id="bar"><div id="bar-fill"></div></div>
  <div id="bar-txt">Đang tải...</div>
</div>
<div id="xhair"></div>
<div class="corner tl"></div><div class="corner tr"></div>
<div class="corner bl"></div><div class="corner br"></div>
<div id="badge"><b>☠ Crime Scene</b><small>First Person · 3D</small></div>
<div id="hint">Giữ chuột trái + kéo để nhìn · WASD di chuyển · Space nhảy</div>
<div id="inspect-label">
  <span id="inspect-name" style="color:#ffdd88"></span>
</div>
<div id="interact-prompt">
  Nhấn <kbd style='background:rgba(255,255,255,0.2);padding:1px 6px;border-radius:4px'>E</kbd> để tương tác
</div>
<div id="interact-popup">
  <div id="popup-title"></div>
  <div id="popup-body"></div>
  <div id="popup-close-hint">Nhấn E hoặc Esc để đóng</div>
</div>
<div id="dpad">
  <!-- Hàng 1 -->
  <div class="btn empty"></div>
  <div class="btn" id="btn-w">▲</div>
  <div class="btn empty"></div>
  <!-- Hàng 2 -->
  <div class="btn" id="btn-a">◀</div>
  <div class="btn btn-center" id="btn-center">⊙</div>
  <div class="btn" id="btn-d">▶</div>
  <!-- Hàng 3 -->
  <div class="btn empty"></div>
  <div class="btn" id="btn-s">▼</div>
  <div class="btn empty"></div>
</div>
<!-- Jump nút riêng biệt bên cạnh -->
<div id="jump-wrap">
  <div id="btn-jump">↑</div>
</div>
<div id="ctrl">
  <div class="cbtn" id="rotate-btn" title="Xoay ngang màn hình">⟳ XOAY NGANG</div>
</div>

<!-- VR Button -->
<div id="vr-btn" title="Xem trong VR / AR">
  <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M2 9C2 7.9 2.9 7 4 7H20C21.1 7 22 7.9 22 9V15C22 16.1 21.1 17 20 17H16L14 15H10L8 17H4C2.9 17 2 16.1 2 15V9Z" stroke="#88aaff" stroke-width="1.6" fill="none"/>
    <circle cx="8.5" cy="12" r="2" stroke="#88aaff" stroke-width="1.4" fill="rgba(80,140,255,0.15)"/>
    <circle cx="15.5" cy="12" r="2" stroke="#88aaff" stroke-width="1.4" fill="rgba(80,140,255,0.15)"/>
  </svg>
</div>

<!-- QR Popup Overlay -->
<div id="qr-overlay">
  <div id="qr-card">
    <button id="qr-close-btn">✕</button>
    <h3>🥽 Trải nghiệm VR / AR</h3>
    <div id="qr-img-wrap">
      <!-- ══ THAY URL ẢNH QR TẠI ĐÂY ══ -->
      <img id="qr-img" src="https://raw.githubusercontent.com/designdaovn/acgiaacbao-3dscene/refs/heads/main/IOS%20ar.png" alt="QR Code" />
    </div>
    <div id="qr-actions">
      <button class="qr-action-btn" id="qr-copy-btn">📋 Copy link</button>
      <button class="qr-action-btn" id="qr-open-btn">🔗 Open link</button>
    </div>
    <div id="qr-copied-msg"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/DRACOLoader.js"></script>
<script>
// ── Renderer ─────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.outputEncoding = THREE.sRGBEncoding;
renderer.toneMapping    = THREE.NoToneMapping;
document.body.appendChild(renderer.domElement);

// ── Scene ─────────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);

// ── Camera — YXZ order: yaw quanh Y trước, pitch quanh X sau ──────
// Đây là cách đúng nhất cho FPS, KHÔNG dùng pivot wrapper
const camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.01, 500);
camera.rotation.order = 'YXZ';
scene.add(camera);

// ── Look angles ──────────────────────────────────────────────────
let yaw   = 0;  // xoay ngang (Y axis)
let pitch = 0;  // ngước/cúi (X axis)

function applyLook() {
  camera.rotation.y = yaw;
  camera.rotation.x = pitch;
}

// ── Load GLB ─────────────────────────────────────────────────────
const barFill = document.getElementById('bar-fill');
const barTxt  = document.getElementById('bar-txt');
const loader  = new THREE.GLTFLoader();
const draco   = new THREE.DRACOLoader();
draco.setDecoderPath('https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/libs/draco/');
loader.setDRACOLoader(draco);

let FLOOR_Y = 0;

loader.load('Crime_Scene.glb',
  (gltf) => {
    barFill.style.width = '80%';
    barTxt.textContent  = 'Đang xử lý...';

    const model = gltf.scene;

    // Tắt đèn gốc GLB (Sun intensity=683 quá mạnh)
    model.traverse((node) => {
      if (node.isLight) { node.visible = false; return; }
      if (!node.isMesh) return;
      node.castShadow    = true;
      node.receiveShadow = true;

      const fix = (mat) => {
        if (!mat) return mat;
        const std = new THREE.MeshStandardMaterial({
          map:         mat.map || null,
          color:       mat.map ? 0xffffff : (mat.color || new THREE.Color(0.8,0.8,0.8)),
          roughness:   0.95,
          metalness:   0.0,
          side:        THREE.DoubleSide,
          transparent: mat.transparent || false,
          alphaTest:   mat.alphaTest   || 0,
        });
        if (std.map) { std.map.encoding = THREE.sRGBEncoding; std.map.needsUpdate = true; }
        return std;
      };
      if (Array.isArray(node.material)) node.material = node.material.map(fix);
      else { const m = fix(node.material); if (m) node.material = m; }
    });

    // 3-point lighting system
    const keyLight = new THREE.DirectionalLight(0xfff5e0, 1.2);
    keyLight.position.set(5, 10, 5); keyLight.castShadow = true;
    keyLight.shadow.mapSize.set(2048,2048); scene.add(keyLight);
    const fillLight = new THREE.DirectionalLight(0xe0f0ff, 0.5);
    fillLight.position.set(-5, 4, -5); scene.add(fillLight);
    const rimLight = new THREE.DirectionalLight(0xffffff, 0.3);
    rimLight.position.set(0, 3, -10); scene.add(rimLight);
    scene.add(new THREE.AmbientLight(0xffffff, 0.6));

    scene.add(model);

    const box    = new THREE.Box3().setFromObject(model);
    const size   = new THREE.Vector3(); box.getSize(size);
    const center = new THREE.Vector3(); box.getCenter(center);
    FLOOR_Y      = box.min.y;
    window._BOX  = box;

    // Đặt camera ở giữa phòng, cao mắt người
    camera.position.set(center.x, FLOOR_Y + 1.65, center.z);
    applyLook();

    barFill.style.width = '100%';
    barTxt.textContent  = 'Hoàn tất! ✓';
    setTimeout(() => {
      const l = document.getElementById('loading');
      l.style.opacity = '0';
      setTimeout(() => l.style.display = 'none', 900);
    }, 300);
    setTimeout(() => document.getElementById('hint').style.opacity = '0', 8000);
  },
  (xhr) => {
    if (xhr.lengthComputable) {
      const p = Math.round(xhr.loaded / xhr.total * 78);
      barFill.style.width = p + '%';
      barTxt.textContent  = `Đang tải... ${p}%`;
    }
  },
  (err) => {
    barTxt.textContent = '❌ Không tìm thấy Crime_Scene.glb — đặt 2 file cùng thư mục';
    barTxt.style.color = '#f55';
    console.error(err);
  }
);

// ── Physics ───────────────────────────────────────────────────────
const GRAVITY  = -14;
const JUMP_VEL = 5.5;
const EYE_H    = 1.65;
let velY       = 0;
let onGround   = false;

// ── Mouse look: giữ chuột trái kéo ───────────────────────────────
let lmb = false, mx = 0, my = 0;

document.addEventListener('mousedown', (e) => {
  if (e.button !== 0) return;
  if (e.target.closest('#dpad,#ctrl,#badge,#hint')) return;
  lmb = true; mx = e.clientX; my = e.clientY;
  document.body.style.cursor = 'grabbing';
});
document.addEventListener('mouseup', (e) => {
  if (e.button !== 0) return;
  lmb = false;
  document.body.style.cursor = 'crosshair';
});
document.addEventListener('mousemove', (e) => {
  if (lmb) {
    yaw   -= (e.clientX - mx) * 0.003;
    pitch -= (e.clientY - my) * 0.003;
    pitch  = Math.max(-1.4, Math.min(1.4, pitch));
    mx = e.clientX; my = e.clientY;
  } else if (document.pointerLockElement) {
    yaw   -= e.movementX * 0.002;
    pitch -= e.movementY * 0.002;
    pitch  = Math.max(-1.4, Math.min(1.4, pitch));
  }
});

// Double-click → Pointer Lock
renderer.domElement.addEventListener('dblclick', () => renderer.domElement.requestPointerLock());
document.addEventListener('pointerlockchange', () => {
  document.body.style.cursor = document.pointerLockElement ? 'none' : 'crosshair';
});

// ── Touch look ────────────────────────────────────────────────────
let tid = null, tlx = 0, tly = 0;
renderer.domElement.addEventListener('touchstart', (e) => {
  if (e.target.closest('#dpad,#ctrl')) return;
  if (tid !== null) return;
  tid = e.changedTouches[0].identifier;
  tlx = e.changedTouches[0].clientX;
  tly = e.changedTouches[0].clientY;
}, { passive: true });
renderer.domElement.addEventListener('touchmove', (e) => {
  for (const t of e.changedTouches) {
    if (t.identifier !== tid) continue;
    yaw   -= (t.clientX - tlx) * 0.004;
    pitch -= (t.clientY - tly) * 0.004;
    pitch  = Math.max(-1.4, Math.min(1.4, pitch));
    tlx = t.clientX; tly = t.clientY;
  }
}, { passive: true });
renderer.domElement.addEventListener('touchend', (e) => {
  for (const t of e.changedTouches) if (t.identifier === tid) tid = null;
}, { passive: true });

// ── Keyboard ─────────────────────────────────────────────────────
const K = {};
document.addEventListener('keydown', (e) => {
  K[e.code] = true;
  if (e.code === 'Space') {
    e.preventDefault();
    if (onGround) { velY = JUMP_VEL; onGround = false; }
  }
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault();
});
document.addEventListener('keyup', (e) => { K[e.code] = false; });

// Nút xoay ngang màn hình (chỉ hoạt động trên mobile)
document.getElementById('rotate-btn').addEventListener('click', () => {
  if (screen.orientation && screen.orientation.lock) {
    // API mới — hỗ trợ Android Chrome
    screen.orientation.lock('landscape').catch(() => {
      // Fallback: dùng webkit
      tryLockLandscape();
    });
  } else {
    tryLockLandscape();
  }
});

function tryLockLandscape() {
  // Fallback cho iOS và các trình duyệt cũ
  if (window.screen.lockOrientation) {
    window.screen.lockOrientation('landscape');
  } else if (window.screen.mozLockOrientation) {
    window.screen.mozLockOrientation('landscape');
  } else if (window.screen.msLockOrientation) {
    window.screen.msLockOrientation('landscape');
  } else {
    // Không hỗ trợ lock → hướng dẫn user xoay tay
    alert('Vui lòng xoay điện thoại sang ngang và tắt khóa xoay màn hình!');
  }
}

// Tự động ẩn/hiện nút xoay tùy theo orientation
function updateRotateBtn() {
  const btn = document.getElementById('rotate-btn');
  if (!btn) return;
  const isLandscape = window.innerWidth > window.innerHeight;
  btn.textContent = isLandscape ? '↕ XOAY DỌC' : '⟳ XOAY NGANG';
}
window.addEventListener('resize', updateRotateBtn);
updateRotateBtn();

// ── D-pad ─────────────────────────────────────────────────────────
[['btn-w','KeyW'],['btn-s','KeyS'],['btn-a','KeyA'],['btn-d','KeyD']].forEach(([id,code]) => {
  const el = document.getElementById(id);
  const on  = (e) => {
    e.preventDefault();          // chặn bôi đen, context menu
    K[code]=true;
    el.classList.add('on');
  };
  const off = (e) => {
    K[code]=false;
    el.classList.remove('on');
  };
  el.addEventListener('mousedown',   on,  {passive:false});
  el.addEventListener('touchstart',  on,  {passive:false});
  el.addEventListener('mouseup',     off);
  el.addEventListener('mouseleave',  off);
  el.addEventListener('touchend',    off, {passive:true});
  el.addEventListener('touchcancel', off, {passive:true}); // ngón tay trượt ra ngoài
});

const doJump = (e) => {
  if (e) e.preventDefault();
  if (onGround) { velY=JUMP_VEL; onGround=false; }
};
const jumpEl = document.getElementById('btn-jump');
jumpEl.addEventListener('mousedown',   doJump, {passive:false});
jumpEl.addEventListener('touchstart',  doJump, {passive:false});
jumpEl.addEventListener('touchend',    ()=>{}, {passive:true});
jumpEl.addEventListener('touchcancel', ()=>{}, {passive:true});
// Chặn context menu trên jump
jumpEl.addEventListener('contextmenu', e => e.preventDefault());
document.getElementById('jump-wrap').addEventListener('contextmenu', e => e.preventDefault());

// ── Game Loop ─────────────────────────────────────────────────────
const clock = new THREE.Clock();

// ── Raycaster (nhìn vào vật nào thì hiện tên) ─────────────────────
const raycaster  = new THREE.Raycaster();
const screenCenter = new THREE.Vector2(0, 0); // giữa màn hình

// ── Dữ liệu tương tác — thêm vật vào đây ─────────────────────────
// key = tên node/mesh, value = nội dung hiển thị khi nhấn E
const INTERACTIONS = {
  // Ví dụ mặc định — bạn có thể thay bằng tên mesh thực tế:
  'Plane.001':           { title: '🩸 Vết máu', body: 'Có vết máu trên mặt đất. Nhóm máu AB+. Cần phân tích thêm.' },
  'Bulletin':            { title: '📋 Bảng thông tin', body: 'Bảng ghi chú của nạn nhân. Có địa chỉ và số điện thoại lạ.' },
  'model_0':             { title: '📋 Bảng thông tin', body: 'Bảng ghi chú của nạn nhân. Có địa chỉ và số điện thoại lạ.' },
  'door_Door_material_0':{ title: '🚪 Cánh cửa', body: 'Cửa bị khóa từ bên trong. Không có dấu hiệu bị phá.' },
  'Triple Monitor_Palette_0': { title: '🖥️ Màn hình máy tính', body: 'Màn hình vẫn còn bật. Có tài liệu mật đang mở.' },
  'Folder_Palette_0':    { title: '📁 Hồ sơ', body: 'Hồ sơ bí mật. Tên: OPERATION X. Ngày: 15/03/2024.' },
  'Paper_Palette_0':     { title: '📄 Tờ giấy', body: 'Một tờ giấy viết tay: "Họ biết tôi ở đây. Đừng tin ai."' },
};

let currentHit   = null;  // mesh đang nhìn vào
let popupOpen    = false;

// Đóng popup
function closePopup() {
  document.getElementById('interact-popup').style.display = 'none';
  popupOpen = false;
}

// Mở popup tương tác
function openPopup(name) {
  const data = INTERACTIONS[name];
  if (!data) return;
  document.getElementById('popup-title').textContent = data.title;
  document.getElementById('popup-body').textContent  = data.body;
  document.getElementById('interact-popup').style.display = 'block';
  popupOpen = true;
}

// ── Tính vị trí bottom cho label (tránh bị d-pad che) ───────────────
function updateLabelPositions() {
  const dpadEl = document.getElementById('dpad');
  const dpadH  = dpadEl.offsetHeight;
  const labelBottom  = 20 + dpadH + 12;
  const promptBottom = labelBottom + 36;
  document.getElementById('inspect-label').style.bottom  = labelBottom  + 'px';
  document.getElementById('interact-prompt').style.bottom = promptBottom + 'px';
  // VR button: đặt trên #ctrl
  const ctrlEl = document.getElementById('ctrl');
  const ctrlH  = ctrlEl.offsetHeight;
  document.getElementById('vr-btn').style.bottom = (20 + ctrlH + 10) + 'px';
}
updateLabelPositions();
window.addEventListener('resize', updateLabelPositions);

// ── Nút ⊙ giữa d-pad = tương tác (thay cho btn-interact) ────────────
const centerBtn = document.getElementById('btn-center');
const doInteract = (e) => {
  if (e) e.preventDefault();
  if (popupOpen) { closePopup(); return; }
  if (currentHit && INTERACTIONS[currentHit]) openPopup(currentHit);
};
centerBtn.addEventListener('click',      doInteract);
centerBtn.addEventListener('touchstart', doInteract, { passive: false });

// ── Tap vào popup để đóng (mobile) ───────────────────────────────────
document.getElementById('interact-popup').addEventListener('click', closePopup);
document.getElementById('interact-popup').addEventListener('touchstart', (e) => {
  e.stopPropagation(); closePopup();
}, { passive: true });

// Phím E và Esc
document.addEventListener('keydown', (e) => {
  if (e.code === 'KeyE') {
    if (popupOpen) { closePopup(); return; }
    if (currentHit && INTERACTIONS[currentHit]) openPopup(currentHit);
  }
  if (e.code === 'Escape') closePopup();
});

// Chặn context menu (menu chuột phải/giữ) trên toàn bộ d-pad
document.getElementById('dpad').addEventListener('contextmenu', e => e.preventDefault());

// Vector tái sử dụng, tránh tạo object mới mỗi frame
const _forward = new THREE.Vector3();
const _right   = new THREE.Vector3();
const _up      = new THREE.Vector3(0, 1, 0);

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);

  // Áp dụng rotation
  camera.rotation.y = yaw;
  camera.rotation.x = pitch;

  // ── Movement ──────────────────────────────────────────────────
  // Dùng getWorldDirection SAU KHI đã set rotation → luôn đúng
  // Lấy hướng nhìn từ camera
  const dir = new THREE.Vector3();
  camera.getWorldDirection(dir);
  dir.y = 0;
  dir.normalize();

  // right = xoay forward -90° (CCW từ trên nhìn xuống) = sang PHẢI
  const rightX =  dir.z;
  const rightZ = -dir.x;

  const mf = ((K['KeyW']||K['ArrowUp'])    ? 1:0) - ((K['KeyS']||K['ArrowDown'])  ? 1:0);
  const mr = ((K['KeyA']||K['ArrowLeft'])  ? 1:0) - ((K['KeyD']||K['ArrowRight']) ? 1:0);

  if (mf !== 0 || mr !== 0) {
    const dx  = dir.x * mf + rightX * mr;
    const dz  = dir.z * mf + rightZ * mr;
    const len = Math.sqrt(dx*dx + dz*dz);
    const sp  = SPEEDS[sMode] * dt;
    camera.position.x += (dx/len) * sp;
    camera.position.z += (dz/len) * sp;
  }

  // ── Gravity & jump ────────────────────────────────────────────
  if (!onGround) velY += GRAVITY * dt;
  camera.position.y += velY * dt;

  const ground = FLOOR_Y + EYE_H;
  if (camera.position.y <= ground) {
    camera.position.y = ground;
    velY = 0;
    onGround = true;
  }

  // ── Boundary clamp ────────────────────────────────────────────
  if (window._BOX) {
    const b = window._BOX, m = 0.2;
    camera.position.x = Math.max(b.min.x+m, Math.min(b.max.x-m, camera.position.x));
    camera.position.z = Math.max(b.min.z+m, Math.min(b.max.z-m, camera.position.z));
  }

  // ── Raycast từ giữa màn hình ────────────────────────────────────
  if (!popupOpen) {
    raycaster.setFromCamera(screenCenter, camera);
    const hits = raycaster.intersectObjects(scene.children, true);

    const inspectEl  = document.getElementById('inspect-label');
    const promptEl   = document.getElementById('interact-prompt');
    const nameEl     = document.getElementById('inspect-name');

    if (hits.length > 0 && hits[0].distance < 4.0) {
      const obj  = hits[0].object;
      const name = obj.name || obj.parent?.name || '';
      currentHit = name;
      nameEl.textContent = '🔍 ' + name;
      inspectEl.style.display = 'block';
      promptEl.style.display  = INTERACTIONS[name] ? 'block' : 'none';
    } else {
      currentHit = null;
      inspectEl.style.display = 'none';
      promptEl.style.display  = 'none';
    }
  }

  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// VR / QR POPUP
// ══ CHỈNH SỬA LINK TẠI ĐÂY ══════════════════════════════
const VR_LINK = 'https://scnry.app/QlJoq6iKEWb';
// ═════════════════════════════════════════════════════════

const vrBtn      = document.getElementById('vr-btn');
const qrOverlay  = document.getElementById('qr-overlay');
const qrCloseBtn = document.getElementById('qr-close-btn');
const qrCopyBtn  = document.getElementById('qr-copy-btn');
const qrOpenBtn  = document.getElementById('qr-open-btn');
const qrCopied   = document.getElementById('qr-copied-msg');

vrBtn.addEventListener('click',     () => qrOverlay.classList.add('open'));
vrBtn.addEventListener('touchstart', (e) => { e.stopPropagation(); qrOverlay.classList.add('open'); }, { passive:true });

function closeQR() { qrOverlay.classList.remove('open'); }
qrCloseBtn.addEventListener('click', closeQR);
qrOverlay.addEventListener('click', (e) => { if (e.target === qrOverlay) closeQR(); });

qrCopyBtn.addEventListener('click', () => {
  navigator.clipboard.writeText(VR_LINK).then(() => {
    qrCopied.textContent = '✓ Đã copy!';
    setTimeout(() => qrCopied.textContent = '', 2000);
  }).catch(() => {
    qrCopied.textContent = VR_LINK;
  });
});

qrOpenBtn.addEventListener('click', () => window.open(VR_LINK, '_blank'));

</script>
