<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crime Scene — First Person</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { overflow:hidden; background:#000; font-family:'Segoe UI',sans-serif; }
canvas { display:block; }

#loading {
  position:fixed; inset:0; background:#0a0a0f;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  z-index:200; transition:opacity 1s;
}
#loading h1 { color:#cc3333; font-size:2rem; letter-spacing:0.3em; text-transform:uppercase; margin-bottom:6px; text-shadow:0 0 30px rgba(200,50,50,0.5); }
#loading p  { color:#555; font-size:0.8rem; letter-spacing:0.1em; margin-bottom:30px; }
#bar { width:260px; height:3px; background:#1a1a2a; border-radius:2px; overflow:hidden; }
#bar-fill { height:100%; width:0%; background:linear-gradient(90deg,#cc3333,#ff6666); transition:width 0.2s; }
#bar-txt { color:#555; margin-top:10px; font-size:0.72rem; letter-spacing:0.06em; }

/* Click to lock overlay */
#lock-overlay {
  position:fixed; inset:0; z-index:100;
  display:flex; align-items:center; justify-content:center;
  background:rgba(0,0,0,0.45); backdrop-filter:blur(2px);
  cursor:pointer;
}
#lock-overlay div {
  background:rgba(0,0,0,0.8); border:1px solid rgba(200,60,60,0.4);
  border-radius:14px; padding:18px 32px; text-align:center;
  color:rgba(255,200,200,0.9); pointer-events:none;
}
#lock-overlay div h2 { font-size:1.1rem; margin-bottom:6px; letter-spacing:0.08em; }
#lock-overlay div p  { font-size:0.75rem; color:#888; }
#lock-overlay.hidden { display:none; }

/* Crosshair */
#xhair {
  position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
  width:14px; height:14px; pointer-events:none; z-index:50;
}
#xhair::before,#xhair::after {
  content:''; position:absolute; background:rgba(255,80,80,0.85); border-radius:1px;
}
#xhair::before { width:2px; height:100%; left:50%; transform:translateX(-50%); }
#xhair::after  { width:100%; height:2px; top:50%; transform:translateY(-50%); }

/* HUD */
#badge {
  position:fixed; top:16px; left:16px; z-index:50;
  background:rgba(0,0,0,0.7); border:1px solid rgba(180,30,30,0.4);
  border-radius:10px; padding:8px 14px; backdrop-filter:blur(10px); pointer-events:none;
}
#badge b { color:#cc3333; font-size:12px; letter-spacing:0.15em; text-transform:uppercase; display:block; }
#badge small { color:#555; font-size:10px; }

#hint {
  position:fixed; top:16px; left:50%; transform:translateX(-50%); z-index:50;
  background:rgba(0,0,0,0.65); color:rgba(255,200,200,0.8);
  padding:6px 18px; border-radius:20px; font-size:11px;
  border:1px solid rgba(180,50,50,0.25); backdrop-filter:blur(8px);
  pointer-events:none; transition:opacity 1.5s; white-space:nowrap;
}

/* D-pad */
#dpad {
  position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
  display:grid; grid-template-columns:repeat(3,52px); grid-template-rows:repeat(3,52px);
  gap:5px; z-index:100;
}
.btn {
  background:rgba(0,0,0,0.5); border:1px solid rgba(200,60,60,0.35);
  border-radius:12px; color:rgba(255,160,160,0.9); font-size:18px;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  user-select:none; -webkit-tap-highlight-color:transparent;
  transition:background 0.1s,transform 0.08s; backdrop-filter:blur(6px);
}
.btn:active,.btn.on { background:rgba(200,50,50,0.4); transform:scale(0.9); }
.btn.empty { visibility:hidden; pointer-events:none; }
#btn-jump { border-color:rgba(80,130,255,0.4); color:rgba(150,190,255,0.9); font-size:20px; }

/* Right controls */
#ctrl {
  position:fixed; bottom:24px; right:14px;
  display:flex; flex-direction:column; gap:7px; z-index:100;
}
.cbtn {
  background:rgba(0,0,0,0.6); border:1px solid rgba(200,60,60,0.3);
  color:#cc6666; font-size:11px; padding:7px 11px;
  border-radius:9px; cursor:pointer; backdrop-filter:blur(8px);
  letter-spacing:0.04em; text-align:center; white-space:nowrap;
}
.cbtn:hover { background:rgba(160,30,30,0.3); }

/* Look zone for mobile */
#lookzone {
  position:fixed; top:0; left:0; width:100%; height:calc(100% - 190px);
  z-index:10;
}

/* Scanlines */
#scanlines {
  position:fixed; inset:0; pointer-events:none; z-index:40;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px);
}
.corner { position:fixed; width:20px; height:20px; border-color:rgba(180,30,30,0.45); border-style:solid; pointer-events:none; z-index:45; }
.corner.tl{top:10px;left:10px;border-width:2px 0 0 2px}
.corner.tr{top:10px;right:10px;border-width:2px 2px 0 0}
.corner.bl{bottom:10px;left:10px;border-width:0 0 2px 2px}
.corner.br{bottom:10px;right:10px;border-width:0 2px 2px 0}
</style>
</head>
<body>

<div id="loading">
  <h1>☠ Crime Scene</h1>
  <p>First Person Explorer</p>
  <div id="bar"><div id="bar-fill"></div></div>
  <div id="bar-txt">Đang tải...</div>
</div>

<div id="lock-overlay" class="hidden">
  <div>
    <h2>🖱 Click để vào game</h2>
    <p>Di chuyển chuột để nhìn xung quanh</p>
  </div>
</div>

<div id="lookzone"></div>
<div id="xhair"></div>
<div id="scanlines"></div>
<div class="corner tl"></div><div class="corner tr"></div>
<div class="corner bl"></div><div class="corner br"></div>

<div id="badge"><b>☠ Crime Scene</b><small>First Person · 3D</small></div>
<div id="hint">WASD di chuyển · Space nhảy · Click màn hình để dùng chuột</div>

<div id="dpad">
  <div class="btn empty"></div>
  <div class="btn" id="btn-w">▲</div>
  <div class="btn" id="btn-jump">↑</div>
  <div class="btn" id="btn-a">◀</div>
  <div class="btn" id="btn-s">▼</div>
  <div class="btn" id="btn-d">▶</div>
  <div class="btn empty"></div>
  <div class="btn empty"></div>
  <div class="btn empty"></div>
</div>

<div id="ctrl">
  <div class="cbtn" id="speed-btn">🚶 NORMAL</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/DRACOLoader.js"></script>
<script>
// ── Renderer ──────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type    = THREE.PCFSoftShadowMap;

// KEY FIX: sRGB encoding so textures show correct colours
renderer.outputEncoding    = THREE.sRGBEncoding;
renderer.toneMapping       = THREE.NoToneMapping;   // no colour grading — show raw texture
renderer.physicallyCorrectLights = false;
document.body.appendChild(renderer.domElement);

// ── Scene ─────────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x222222);

// ── Camera inside a pivot for FPS ─────────────────────────────────
const pivot  = new THREE.Object3D(); // yaw (left/right)
const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.05, 300);
camera.rotation.order = 'YXZ';
pivot.add(camera);
scene.add(pivot);

// ── Lights — bright enough to see textures ─────────────────────────
scene.add(new THREE.AmbientLight(0xffffff, 2.5));   // strong ambient so no dark spots

const sun = new THREE.DirectionalLight(0xffffff, 1.5);
sun.position.set(10, 20, 10);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.near   =  0.5;
sun.shadow.camera.far    =  100;
sun.shadow.camera.left   = -30;
sun.shadow.camera.right  =  30;
sun.shadow.camera.top    =  30;
sun.shadow.camera.bottom = -30;
scene.add(sun);

// Fill from opposite side
const fill = new THREE.DirectionalLight(0xffffff, 0.8);
fill.position.set(-10, 10, -10);
scene.add(fill);

// ── Load GLB ─────────────────────────────────────────────────────
const barFill = document.getElementById('bar-fill');
const barTxt  = document.getElementById('bar-txt');

const glLoader = new THREE.GLTFLoader();
const draco    = new THREE.DRACOLoader();
draco.setDecoderPath('https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/libs/draco/');
glLoader.setDRACOLoader(draco);

let FLOOR_Y = 0;

glLoader.load(
  'Crime_Scene.glb',
  (gltf) => {
    barFill.style.width = '85%';
    barTxt.textContent  = 'Đang dựng scene...';

    const model = gltf.scene;

    model.traverse((node) => {
      if (!node.isMesh) return;
      node.castShadow    = true;
      node.receiveShadow = true;

      const applyMat = (mat) => {
        if (!mat) return;
        // Force double-sided so back faces are visible
        mat.side = THREE.DoubleSide;

        // Fix texture colour space
        ['map','emissiveMap','aoMap','roughnessMap','metalnessMap','normalMap'].forEach(key => {
          if (mat[key]) {
            mat[key].encoding = (key === 'map' || key === 'emissiveMap')
              ? THREE.sRGBEncoding
              : THREE.LinearEncoding;
            mat[key].needsUpdate = true;
          }
        });
        mat.needsUpdate = true;
      };

      if (Array.isArray(node.material)) node.material.forEach(applyMat);
      else applyMat(node.material);
    });

    scene.add(model);

    // Auto-fit
    const box    = new THREE.Box3().setFromObject(model);
    const size   = new THREE.Vector3(); box.getSize(size);
    const center = new THREE.Vector3(); box.getCenter(center);

    // Scale to reasonable room size (~10 units wide)
    const maxDim = Math.max(size.x, size.z);
    if (maxDim < 2) {
      const s = 10 / maxDim;
      model.scale.setScalar(s);
      box.setFromObject(model); box.getSize(size); box.getCenter(center);
    } else if (maxDim > 200) {
      const s = 40 / maxDim;
      model.scale.setScalar(s);
      box.setFromObject(model); box.getSize(size); box.getCenter(center);
    }

    FLOOR_Y     = box.min.y;
    window._BOX = box;

    pivot.position.set(center.x, FLOOR_Y + 1.65, center.z);

    barFill.style.width = '100%';
    barTxt.textContent  = 'Hoàn tất! ✓';

    setTimeout(() => {
      const l = document.getElementById('loading');
      l.style.opacity = '0';
      setTimeout(() => l.style.display = 'none', 800);

      // Show lock overlay
      document.getElementById('lock-overlay').classList.remove('hidden');
    }, 300);

    setTimeout(() => document.getElementById('hint').style.opacity = '0', 8000);
  },
  (xhr) => {
    if (xhr.lengthComputable) {
      const p = Math.round(xhr.loaded / xhr.total * 82);
      barFill.style.width = p + '%';
      barTxt.textContent  = `Đang tải... ${p}%`;
    }
  },
  (err) => {
    barTxt.textContent = '❌ Không tìm thấy Crime_Scene.glb — đặt 2 file cùng thư mục';
    barTxt.style.color = '#f55';
    console.error(err);
  }
);

// ── FPS State ────────────────────────────────────────────────────
const GRAVITY     = -14;
const JUMP_VEL    =   5.5;
const EYE_HEIGHT  =   1.65;
let   velY        =   0;
let   onGround    =   false;
let   pitchAngle  =   0;   // camera x-rotation (up/down look)
let   yawAngle    =   0;   // pivot y-rotation  (left/right look)

// ── Pointer Lock ─────────────────────────────────────────────────
let locked = false;

document.getElementById('lock-overlay').addEventListener('click', () => {
  renderer.domElement.requestPointerLock();
});

document.addEventListener('pointerlockchange', () => {
  locked = !!document.pointerLockElement;
  document.getElementById('lock-overlay').classList.toggle('hidden', locked);
});

document.addEventListener('mousemove', (e) => {
  if (!locked) return;
  yawAngle   -= e.movementX * 0.002;
  pitchAngle -= e.movementY * 0.002;
  pitchAngle  = Math.max(-1.4, Math.min(1.4, pitchAngle));
});

// ── Touch look (mobile) ──────────────────────────────────────────
let touchId = null, tLastX = 0, tLastY = 0;
const lz = document.getElementById('lookzone');
lz.addEventListener('touchstart', e => {
  if (touchId !== null) return;
  touchId = e.changedTouches[0].identifier;
  tLastX  = e.changedTouches[0].clientX;
  tLastY  = e.changedTouches[0].clientY;
}, { passive: true });
lz.addEventListener('touchmove', e => {
  for (const t of e.changedTouches) {
    if (t.identifier !== touchId) continue;
    yawAngle   -= (t.clientX - tLastX) * 0.004;
    pitchAngle -= (t.clientY - tLastY) * 0.004;
    pitchAngle  = Math.max(-1.4, Math.min(1.4, pitchAngle));
    tLastX = t.clientX; tLastY = t.clientY;
  }
}, { passive: true });
lz.addEventListener('touchend', e => {
  for (const t of e.changedTouches) if (t.identifier === touchId) touchId = null;
}, { passive: true });

// ── Keyboard ─────────────────────────────────────────────────────
const K = {};
document.addEventListener('keydown', e => {
  K[e.code] = true;
  if (e.code === 'Space') {
    e.preventDefault();
    if (onGround) { velY = JUMP_VEL; onGround = false; }
  }
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault();
});
document.addEventListener('keyup', e => { K[e.code] = false; });

// ── Speed ────────────────────────────────────────────────────────
const SPEEDS = [4.0, 9.0, 1.5];
const SLABELS = ['🚶 NORMAL','🏃 FAST','🐢 SLOW'];
let sMode = 0;
document.getElementById('speed-btn').addEventListener('click', () => {
  sMode = (sMode + 1) % 3;
  document.getElementById('speed-btn').textContent = SLABELS[sMode];
});
window.addEventListener('wheel', e => {
  sMode = e.deltaY < 0 ? 1 : 0;
  document.getElementById('speed-btn').textContent = SLABELS[sMode];
}, { passive: true });

// ── D-pad ────────────────────────────────────────────────────────
const PAD = {
  'btn-w': 'KeyW', 'btn-s': 'KeyS',
  'btn-a': 'KeyA', 'btn-d': 'KeyD',
};
for (const [id, code] of Object.entries(PAD)) {
  const el = document.getElementById(id);
  const on  = () => { K[code] = true;  el.classList.add('on'); };
  const off = () => { K[code] = false; el.classList.remove('on'); };
  el.addEventListener('mousedown',  on);
  el.addEventListener('touchstart', on,  { passive: true });
  el.addEventListener('mouseup',    off);
  el.addEventListener('touchend',   off, { passive: true });
  el.addEventListener('mouseleave', off);
}
// Jump button
const jBtn = document.getElementById('btn-jump');
const doJump = () => { if (onGround) { velY = JUMP_VEL; onGround = false; } };
jBtn.addEventListener('mousedown',  doJump);
jBtn.addEventListener('touchstart', doJump, { passive: true });

// ── Clock ────────────────────────────────────────────────────────
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);

  // Apply look
  pivot.rotation.y  = yawAngle;
  camera.rotation.x = pitchAngle;

  // Movement vector (horizontal only, based on yaw)
  const speed  = SPEEDS[sMode] * dt;
  const sinY   = Math.sin(yawAngle);
  const cosY   = Math.cos(yawAngle);

  const fwd = (K['KeyW'] || K['ArrowUp'])    ? 1 : 0;
  const bck = (K['KeyS'] || K['ArrowDown'])  ? 1 : 0;
  const lft = (K['KeyA'] || K['ArrowLeft'])  ? 1 : 0;
  const rgt = (K['KeyD'] || K['ArrowRight']) ? 1 : 0;

  let dx = sinY * (fwd - bck) + cosY * (rgt - lft);
  let dz = -cosY * (fwd - bck) + sinY * (rgt - lft);

  // Normalise diagonal movement
  const len = Math.sqrt(dx*dx + dz*dz);
  if (len > 0) { dx = dx/len * speed; dz = dz/len * speed; }

  pivot.position.x += dx;
  pivot.position.z += dz;

  // Gravity
  if (!onGround) velY += GRAVITY * dt;
  pivot.position.y += velY * dt;

  // Floor
  const floorLevel = FLOOR_Y + EYE_HEIGHT;
  if (pivot.position.y <= floorLevel) {
    pivot.position.y = floorLevel;
    velY = 0;
    onGround = true;
  }

  // Boundary clamp
  if (window._BOX) {
    const b = window._BOX, m = 0.25;
    pivot.position.x = Math.max(b.min.x + m, Math.min(b.max.x - m, pivot.position.x));
    pivot.position.z = Math.max(b.min.z + m, Math.min(b.max.z - m, pivot.position.z));
  }

  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
