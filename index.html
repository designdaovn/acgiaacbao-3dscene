<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crime Scene — First Person</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { overflow:hidden; background:#0a0a0f; font-family:'Segoe UI',sans-serif; }
  canvas { display:block; }

  #loading {
    position:fixed; inset:0; background:#0a0a0f;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    z-index:100; transition:opacity 1s;
  }
  #loading h1 {
    color:#cc3333; font-size:2.2rem; letter-spacing:0.35em;
    text-transform:uppercase; margin-bottom:6px;
    text-shadow: 0 0 30px rgba(200,50,50,0.5);
  }
  #loading p { color:#555; font-size:0.82rem; letter-spacing:0.12em; margin-bottom:36px; }
  #progress-bar { width:260px; height:3px; background:#1a1a2a; border-radius:2px; overflow:hidden; }
  #progress-fill { height:100%; width:0%; background:linear-gradient(90deg,#cc3333,#ff6666); border-radius:2px; transition:width 0.2s; }
  #loading-sub { color:#444; margin-top:12px; font-size:0.75rem; letter-spacing:0.08em; }

  /* Crosshair */
  #crosshair {
    position:fixed; top:50%; left:50%;
    transform:translate(-50%,-50%);
    width:16px; height:16px; pointer-events:none; z-index:50;
  }
  #crosshair::before, #crosshair::after {
    content:''; position:absolute;
    background:rgba(255,80,80,0.8); border-radius:1px;
  }
  #crosshair::before { width:2px; height:100%; left:50%; transform:translateX(-50%); }
  #crosshair::after  { width:100%; height:2px; top:50%; transform:translateY(-50%); }

  /* HUD */
  #title-badge {
    position:fixed; top:18px; left:18px;
    background:rgba(0,0,0,0.7); border:1px solid rgba(180,30,30,0.4);
    border-radius:10px; padding:9px 15px; backdrop-filter:blur(10px);
    pointer-events:none; z-index:50;
  }
  #title-badge span { color:#cc3333; font-size:13px; font-weight:700; letter-spacing:0.15em; text-transform:uppercase; display:block; }
  #title-badge small { color:#555; font-size:10px; letter-spacing:0.08em; margin-top:2px; display:block; }

  #hint {
    position:fixed; top:18px; left:50%; transform:translateX(-50%);
    background:rgba(0,0,0,0.65); color:rgba(255,200,200,0.8);
    padding:7px 20px; border-radius:20px; font-size:12px;
    border:1px solid rgba(180,50,50,0.25); backdrop-filter:blur(8px);
    pointer-events:none; z-index:50; transition:opacity 1.5s; white-space:nowrap;
  }

  /* Scanlines */
  #scanlines {
    position:fixed; inset:0; pointer-events:none; z-index:40;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
  }

  /* Corner decorations */
  .corner { position:fixed; width:22px; height:22px; border-color:rgba(180,30,30,0.5); border-style:solid; pointer-events:none; z-index:45; }
  .corner.tl { top:10px; left:10px; border-width:2px 0 0 2px; }
  .corner.tr { top:10px; right:10px; border-width:2px 2px 0 0; }
  .corner.bl { bottom:10px; left:10px; border-width:0 0 2px 2px; }
  .corner.br { bottom:10px; right:10px; border-width:0 2px 2px 0; }

  /* D-pad */
  #dpad {
    position:fixed; bottom:28px; left:50%; transform:translateX(-50%);
    display:grid; grid-template-columns:repeat(3,54px); grid-template-rows:repeat(3,54px);
    gap:5px; z-index:100;
  }
  .btn {
    background:rgba(180,30,30,0.15); border:1px solid rgba(200,60,60,0.3);
    border-radius:12px; color:rgba(255,180,180,0.9); font-size:18px;
    cursor:pointer; display:flex; align-items:center; justify-content:center;
    backdrop-filter:blur(6px); transition:background 0.12s, transform 0.08s;
    user-select:none; -webkit-tap-highlight-color:transparent;
  }
  .btn:active, .btn.pressed { background:rgba(200,50,50,0.45); transform:scale(0.91); }
  .btn.empty { visibility:hidden; pointer-events:none; }

  /* Look zone (touch drag to look) */
  #look-zone {
    position:fixed; top:0; left:0;
    width:100%; height:calc(100% - 200px);
    z-index:10; cursor:grab;
  }
  #look-zone:active { cursor:grabbing; }

  /* Speed & Fly */
  #controls-right {
    position:fixed; bottom:28px; right:16px;
    display:flex; flex-direction:column; gap:8px; z-index:100;
  }
  .ctrl-btn {
    background:rgba(0,0,0,0.6); border:1px solid rgba(200,60,60,0.3);
    color:#cc6666; font-size:11px; padding:8px 13px;
    border-radius:9px; cursor:pointer; backdrop-filter:blur(8px);
    letter-spacing:0.05em; text-align:center;
  }
  .ctrl-btn:hover { background:rgba(160,30,30,0.3); }
  .ctrl-btn.active { border-color:rgba(100,150,255,0.5); color:#88aaff; }

  /* Status */
  #status {
    position:fixed; bottom:20px; left:16px; z-index:55;
    display:flex; align-items:center; gap:7px;
    background:rgba(0,0,0,0.6); border:1px solid rgba(180,30,30,0.2);
    border-radius:20px; padding:5px 12px; backdrop-filter:blur(8px);
    pointer-events:none;
  }
  .dot { width:7px; height:7px; border-radius:50%; background:#cc3333; animation:pulse 2s infinite; }
  #status span { color:#666; font-size:10px; letter-spacing:0.08em; }
  @keyframes pulse { 0%,100%{opacity:1;box-shadow:0 0 4px #cc3333;} 50%{opacity:0.3;box-shadow:none;} }
</style>
</head>
<body>

<div id="loading">
  <h1>☠ Crime Scene</h1>
  <p>First Person Explorer</p>
  <div id="progress-bar"><div id="progress-fill"></div></div>
  <div id="loading-sub">Đang tải...</div>
</div>

<div id="look-zone"></div>
<div id="crosshair"></div>
<div id="scanlines"></div>
<div class="corner tl"></div><div class="corner tr"></div>
<div class="corner bl"></div><div class="corner br"></div>

<div id="title-badge">
  <span>☠ Crime Scene</span>
  <small>First Person · 3D Explorer</small>
</div>
<div id="hint">🖱 Kéo để nhìn · WASD / ↑↓←→ di chuyển · Q/E lên xuống</div>

<div id="status"><div class="dot"></div><span>LIVE · FIRST PERSON</span></div>

<div id="dpad">
  <div class="btn empty"></div>
  <div class="btn" id="btn-forward">▲</div>
  <div class="btn empty"></div>
  <div class="btn" id="btn-left">◀</div>
  <div class="btn" id="btn-back">▼</div>
  <div class="btn" id="btn-right">▶</div>
  <div class="btn empty"></div>
  <div class="btn empty"></div>
  <div class="btn empty"></div>
</div>

<div id="controls-right">
  <div class="ctrl-btn" id="speed-btn">🚶 NORMAL</div>
  <div class="ctrl-btn" id="fly-btn">✈ FLY OFF</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/DRACOLoader.js"></script>

<script>
// ─── Renderer ────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputEncoding = THREE.sRGBEncoding;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
document.body.appendChild(renderer.domElement);

// ─── Scene ───────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a0f);
scene.fog = new THREE.FogExp2(0x0a0a0f, 0.018);

// ─── Camera ──────────────────────────────────────────────────────
const camera = new THREE.PerspectiveCamera(70, innerWidth / innerHeight, 0.05, 200);
camera.rotation.order = 'YXZ';
camera.position.set(0, 1.65, 0);

// ─── Lights ──────────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0xfff5e0, 0.7));

const dirLight = new THREE.DirectionalLight(0xffe8cc, 1.0);
dirLight.position.set(8, 12, 6);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(2048, 2048);
dirLight.shadow.camera.near = 0.1;
dirLight.shadow.camera.far = 80;
dirLight.shadow.camera.left = -25;
dirLight.shadow.camera.right = 25;
dirLight.shadow.camera.top = 25;
dirLight.shadow.camera.bottom = -25;
scene.add(dirLight);

const fillLight = new THREE.PointLight(0x334466, 0.6, 60);
fillLight.position.set(-8, 5, -8);
scene.add(fillLight);

const warmLight = new THREE.PointLight(0xff4411, 0.3, 40);
warmLight.position.set(5, 3, 5);
scene.add(warmLight);

// ─── Load GLB ────────────────────────────────────────────────────
const fill   = document.getElementById('progress-fill');
const sub    = document.getElementById('loading-sub');
const loader = new THREE.GLTFLoader();

// Setup Draco decoder (handles compressed GLBs)
const draco = new THREE.DRACOLoader();
draco.setDecoderPath('https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/libs/draco/');
loader.setDRACOLoader(draco);

loader.load(
  'Crime_Scene.glb',
  (gltf) => {
    fill.style.width = '90%';
    sub.textContent = 'Đang dựng scene...';

    const model = gltf.scene;
    model.traverse(child => {
      if (child.isMesh) {
        child.castShadow    = true;
        child.receiveShadow = true;
        // Improve material quality
        if (child.material) {
          child.material.envMapIntensity = 0.5;
        }
      }
    });
    scene.add(model);

    // Auto-fit camera inside model
    const box3   = new THREE.Box3().setFromObject(model);
    const size   = new THREE.Vector3(); box3.getSize(size);
    const center = new THREE.Vector3(); box3.getCenter(center);

    console.log('Size:', size);

    // Auto scale
    const maxDim = Math.max(size.x, size.z);
    if (maxDim > 0 && maxDim < 3) {
      const s = 10 / maxDim;
      model.scale.setScalar(s);
      box3.setFromObject(model); box3.getSize(size); box3.getCenter(center);
    } else if (maxDim > 300) {
      const s = 60 / maxDim;
      model.scale.setScalar(s);
      box3.setFromObject(model); box3.getSize(size); box3.getCenter(center);
    }

    // Place camera inside, at eye height
    const eyeH = box3.min.y + Math.min(1.65, size.y * 0.35);
    camera.position.set(center.x, eyeH, center.z);

    // Store bounds
    window._bounds = { box3, size, center, floorY: box3.min.y };

    fill.style.width = '100%';
    sub.textContent = 'Hoàn tất! ✓';

    setTimeout(() => {
      const l = document.getElementById('loading');
      l.style.opacity = '0';
      setTimeout(() => l.style.display = 'none', 900);
    }, 400);

    setTimeout(() => {
      document.getElementById('hint').style.opacity = '0';
    }, 7000);
  },
  (xhr) => {
    if (xhr.lengthComputable) {
      const pct = Math.round(xhr.loaded / xhr.total * 85);
      fill.style.width = pct + '%';
      sub.textContent  = `Đang tải... ${pct}%`;
    }
  },
  (err) => {
    sub.textContent = '❌ Không tìm thấy Crime_Scene.glb — hãy đặt 2 file cùng thư mục';
    sub.style.color = '#ff4444';
    fill.style.background = '#ff4444';
    console.error(err);
  }
);

// ─── Input ───────────────────────────────────────────────────────
const keys = {};
document.addEventListener('keydown', e => { keys[e.code] = true; e.preventDefault(); });
document.addEventListener('keyup',   e => { keys[e.code] = false; });

// Mouse / touch look
let yaw = 0, pitch = 0, isDragging = false, lastX = 0, lastY = 0;
const lookZone = document.getElementById('look-zone');

lookZone.addEventListener('mousedown', e => { isDragging = true; lastX = e.clientX; lastY = e.clientY; });
window.addEventListener('mouseup',  () => isDragging = false);
window.addEventListener('mousemove', e => {
  if (!isDragging) return;
  yaw   -= (e.clientX - lastX) * 0.003;
  pitch -= (e.clientY - lastY) * 0.003;
  pitch  = Math.max(-1.3, Math.min(1.0, pitch));
  lastX  = e.clientX; lastY = e.clientY;
});

lookZone.addEventListener('touchstart', e => {
  isDragging = true;
  lastX = e.touches[0].clientX; lastY = e.touches[0].clientY;
}, { passive: true });
window.addEventListener('touchend', () => isDragging = false);
lookZone.addEventListener('touchmove', e => {
  if (!isDragging) return;
  yaw   -= (e.touches[0].clientX - lastX) * 0.004;
  pitch -= (e.touches[0].clientY - lastY) * 0.004;
  pitch  = Math.max(-1.3, Math.min(1.0, pitch));
  lastX  = e.touches[0].clientX; lastY = e.touches[0].clientY;
}, { passive: true });

// Speed
let speedMode = 0;
const speedVals   = [3.0, 6.5, 1.2];
const speedLabels = ['🚶 NORMAL', '🏃 FAST', '🐢 SLOW'];
document.getElementById('speed-btn').addEventListener('click', () => {
  speedMode = (speedMode + 1) % 3;
  document.getElementById('speed-btn').textContent = speedLabels[speedMode];
});
window.addEventListener('wheel', e => {
  speedMode = e.deltaY < 0 ? 1 : 0;
  document.getElementById('speed-btn').textContent = speedLabels[speedMode];
});

// Fly mode
let flyMode = false;
document.getElementById('fly-btn').addEventListener('click', () => {
  flyMode = !flyMode;
  const btn = document.getElementById('fly-btn');
  btn.textContent = flyMode ? '✈ FLY ON' : '✈ FLY OFF';
  btn.classList.toggle('active', flyMode);
});

// D-pad
const btnMap = {
  'btn-forward': 'ArrowUp', 'btn-back':  'ArrowDown',
  'btn-left':    'ArrowLeft', 'btn-right': 'ArrowRight'
};
Object.entries(btnMap).forEach(([id, code]) => {
  const el = document.getElementById(id);
  const press   = () => { keys[code] = true;  el.classList.add('pressed'); };
  const release = () => { keys[code] = false; el.classList.remove('pressed'); };
  el.addEventListener('mousedown',  press);
  el.addEventListener('touchstart', press,   { passive: true });
  el.addEventListener('mouseup',    release);
  el.addEventListener('touchend',   release, { passive: true });
  el.addEventListener('mouseleave', release);
});

// ─── Pointer Lock (desktop — click to lock mouse) ────────────────
renderer.domElement.addEventListener('click', () => {
  if (!document.pointerLockElement) {
    renderer.domElement.requestPointerLock();
  }
});
document.addEventListener('pointerlockchange', () => {
  if (document.pointerLockElement === renderer.domElement) {
    document.addEventListener('mousemove', onLockedMove);
  } else {
    document.removeEventListener('mousemove', onLockedMove);
  }
});
function onLockedMove(e) {
  yaw   -= e.movementX * 0.002;
  pitch -= e.movementY * 0.002;
  pitch  = Math.max(-1.3, Math.min(1.0, pitch));
}

// ─── Animate ─────────────────────────────────────────────────────
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const dt    = Math.min(clock.getDelta(), 0.05);
  const speed = speedVals[speedMode] * dt;

  camera.rotation.y = yaw;
  camera.rotation.x = pitch;

  const fwd = (keys['KeyW'] || keys['ArrowUp'])    ? 1 : 0;
  const bck = (keys['KeyS'] || keys['ArrowDown'])  ? 1 : 0;
  const lft = (keys['KeyA'] || keys['ArrowLeft'])  ? 1 : 0;
  const rgt = (keys['KeyD'] || keys['ArrowRight']) ? 1 : 0;
  const up  = (keys['KeyQ'] || keys['Space'])      ? 1 : 0;
  const dn  = (keys['KeyE'] || keys['ShiftLeft'])  ? 1 : 0;

  let nx = camera.position.x + Math.sin(yaw) * (fwd - bck) * speed + Math.cos(yaw) * (rgt - lft) * speed;
  let nz = camera.position.z - Math.cos(yaw) * (fwd - bck) * speed + Math.sin(yaw) * (rgt - lft) * speed;
  let ny = camera.position.y;

  if (flyMode) {
    ny += (up - dn) * speed * 1.5;
  } else {
    if (window._bounds) ny = window._bounds.floorY + 1.65;
  }

  // Soft bounds
  if (window._bounds) {
    const { box3 } = window._bounds;
    const m = 0.2;
    nx = Math.max(box3.min.x + m, Math.min(box3.max.x - m, nx));
    nz = Math.max(box3.min.z + m, Math.min(box3.max.z - m, nz));
    if (flyMode) ny = Math.max(box3.min.y + 0.3, Math.min(box3.max.y - 0.3, ny));
  }

  camera.position.set(nx, ny, nz);
  renderer.render(scene, camera);
}
animate();

// ─── Resize ──────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
