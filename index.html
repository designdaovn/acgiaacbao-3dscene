<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crime Scene — First Person</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { overflow:hidden; background:#111; font-family:'Segoe UI',sans-serif; }
canvas { display:block; cursor:crosshair; }
#loading {
  position:fixed; inset:0; background:#0a0a0f;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  z-index:200; transition:opacity 1s;
}
#loading h1 { color:#cc3333; font-size:2rem; letter-spacing:0.3em; text-transform:uppercase; margin-bottom:6px; text-shadow:0 0 30px rgba(200,50,50,0.5); }
#loading p  { color:#555; font-size:0.8rem; letter-spacing:0.1em; margin-bottom:30px; }
#bar { width:260px; height:3px; background:#1a1a2a; border-radius:2px; overflow:hidden; }
#bar-fill { height:100%; width:0%; background:linear-gradient(90deg,#cc3333,#ff6666); transition:width 0.2s; }
#bar-txt { color:#555; margin-top:10px; font-size:0.72rem; letter-spacing:0.06em; }

#xhair {
  position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
  width:16px; height:16px; pointer-events:none; z-index:50;
}
#xhair::before,#xhair::after { content:''; position:absolute; background:rgba(255,80,80,0.9); border-radius:1px; }
#xhair::before { width:2px; height:100%; left:50%; transform:translateX(-50%); }
#xhair::after  { width:100%; height:2px; top:50%; transform:translateY(-50%); }

#badge {
  position:fixed; top:16px; left:16px; z-index:50; pointer-events:none;
  background:rgba(0,0,0,0.7); border:1px solid rgba(180,30,30,0.4);
  border-radius:10px; padding:8px 14px; backdrop-filter:blur(10px);
}
#badge b     { color:#cc3333; font-size:12px; letter-spacing:0.12em; text-transform:uppercase; display:block; }
#badge small { color:#555; font-size:10px; }

#hint {
  position:fixed; top:16px; left:50%; transform:translateX(-50%); z-index:50;
  background:rgba(0,0,0,0.7); color:rgba(255,200,200,0.85);
  padding:7px 18px; border-radius:20px; font-size:11px;
  border:1px solid rgba(180,50,50,0.3); backdrop-filter:blur(8px);
  pointer-events:none; transition:opacity 1.5s; white-space:nowrap;
}

/* D-pad */
#dpad {
  position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
  display:grid; grid-template-columns:repeat(3,52px); grid-template-rows:repeat(3,52px);
  gap:5px; z-index:100;
}
.btn {
  background:rgba(0,0,0,0.55); border:1px solid rgba(200,60,60,0.4);
  border-radius:12px; color:rgba(255,160,160,0.9); font-size:18px;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  user-select:none; -webkit-tap-highlight-color:transparent;
  transition:background 0.1s; backdrop-filter:blur(6px);
}
.btn:active,.btn.on { background:rgba(200,50,50,0.5); transform:scale(0.92); }
.btn.empty { visibility:hidden; pointer-events:none; }
#btn-jump { border-color:rgba(80,140,255,0.45); color:rgba(160,200,255,0.95); }

#ctrl {
  position:fixed; bottom:24px; right:14px;
  display:flex; flex-direction:column; gap:7px; z-index:100;
}
.cbtn {
  background:rgba(0,0,0,0.65); border:1px solid rgba(200,60,60,0.35);
  color:#cc6666; font-size:11px; padding:7px 11px;
  border-radius:9px; cursor:pointer; backdrop-filter:blur(8px); text-align:center;
}
.cbtn:hover { background:rgba(160,30,30,0.35); }

#lookzone {
  position:fixed; top:0; left:0;
  width:100%; height:calc(100% - 190px);
  z-index:10;
}

.corner { position:fixed; width:20px; height:20px; border-color:rgba(200,30,30,0.4); border-style:solid; pointer-events:none; z-index:45; }
.corner.tl{top:10px;left:10px;border-width:2px 0 0 2px}
.corner.tr{top:10px;right:10px;border-width:2px 2px 0 0}
.corner.bl{bottom:10px;left:10px;border-width:0 0 2px 2px}
.corner.br{bottom:10px;right:10px;border-width:0 2px 2px 0}
</style>
</head>
<body>

<div id="loading">
  <h1>☠ Crime Scene</h1>
  <p>First Person Explorer</p>
  <div id="bar"><div id="bar-fill"></div></div>
  <div id="bar-txt">Đang tải...</div>
</div>

<div id="lookzone"></div>
<div id="xhair"></div>
<div class="corner tl"></div><div class="corner tr"></div>
<div class="corner bl"></div><div class="corner br"></div>
<div id="badge"><b>☠ Crime Scene</b><small>First Person · 3D</small></div>
<div id="hint">Giữ chuột trái + kéo để nhìn · WASD di chuyển · Space nhảy</div>

<div id="dpad">
  <div class="btn empty"></div>
  <div class="btn" id="btn-w">▲</div>
  <div class="btn" id="btn-jump">↑</div>
  <div class="btn" id="btn-a">◀</div>
  <div class="btn" id="btn-s">▼</div>
  <div class="btn" id="btn-d">▶</div>
  <div class="btn empty"></div>
  <div class="btn empty"></div>
  <div class="btn empty"></div>
</div>

<div id="ctrl">
  <div class="cbtn" id="speed-btn">🚶 NORMAL</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/DRACOLoader.js"></script>
<script>
// ── Renderer ─────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type    = THREE.PCFSoftShadowMap;
renderer.outputEncoding    = THREE.sRGBEncoding;
// NoToneMapping + physicallyCorrectLights=false để giữ màu gốc của texture
renderer.toneMapping              = THREE.NoToneMapping;
renderer.physicallyCorrectLights  = false;
document.body.appendChild(renderer.domElement);

// ── Scene ────────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x222222);

// ── Camera pivot (FPS) ───────────────────────────────────────────
// pivot = thân người (quay trái/phải)
// camera = đầu (nhìn lên/xuống)
const pivot  = new THREE.Object3D();
const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 500);
camera.rotation.order = 'YXZ';
pivot.add(camera);
scene.add(pivot);

// ── Load GLB ─────────────────────────────────────────────────────
const barFill = document.getElementById('bar-fill');
const barTxt  = document.getElementById('bar-txt');

const gltfLoader = new THREE.GLTFLoader();
const draco      = new THREE.DRACOLoader();
draco.setDecoderPath('https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/libs/draco/');
gltfLoader.setDRACOLoader(draco);

let FLOOR_Y = 0;

gltfLoader.load('Crime_Scene.glb',
  (gltf) => {
    barFill.style.width = '80%';
    barTxt.textContent  = 'Đang xử lý materials...';

    const model = gltf.scene;

    // ── Điều chỉnh đèn có sẵn trong GLB (Sun intensity=683 → quá sáng) ──
    model.traverse((node) => {
      // Giảm intensity của tất cả lights trong scene
      if (node.isLight) {
        console.log('Light found:', node.type, 'intensity:', node.intensity);
        if (node.isDirectionalLight || node.isPointLight || node.isSpotLight) {
          // Normalize intensity về mức hợp lý
          node.intensity = Math.min(node.intensity, 2.0);
        }
      }

      if (!node.isMesh) return;

      node.castShadow    = true;
      node.receiveShadow = true;

      const fixMaterial = (mat) => {
        if (!mat) return;

        // DoubleSide: fix negative-scale nodes + thin walls
        mat.side = THREE.DoubleSide;

        // Fix texture encoding
        if (mat.map) {
          mat.map.encoding    = THREE.sRGBEncoding;
          mat.map.needsUpdate = true;
        }
        if (mat.emissiveMap) {
          mat.emissiveMap.encoding    = THREE.sRGBEncoding;
          mat.emissiveMap.needsUpdate = true;
        }

        mat.needsUpdate = true;
      };

      if (Array.isArray(node.material)) node.material.forEach(fixMaterial);
      else fixMaterial(node.material);
    });

    scene.add(model);

    // ── Thêm ambient light nhẹ để fill shadow ──
    // (không thêm directional vì GLB đã có Sun)
    scene.add(new THREE.AmbientLight(0xffffff, 0.4));

    // ── Auto-fit camera ──
    const box    = new THREE.Box3().setFromObject(model);
    const size   = new THREE.Vector3(); box.getSize(size);
    const center = new THREE.Vector3(); box.getCenter(center);

    console.log('Room size:', size.x.toFixed(1), size.y.toFixed(1), size.z.toFixed(1));
    console.log('Room center:', center.x.toFixed(1), center.y.toFixed(1), center.z.toFixed(1));

    FLOOR_Y      = box.min.y;
    window._BOX  = box;

    pivot.position.set(center.x, FLOOR_Y + 1.65, center.z);

    barFill.style.width = '100%';
    barTxt.textContent  = 'Hoàn tất! ✓';

    setTimeout(() => {
      const l = document.getElementById('loading');
      l.style.opacity = '0';
      setTimeout(() => l.style.display = 'none', 900);
    }, 300);

    setTimeout(() => document.getElementById('hint').style.opacity = '0', 8000);
  },
  (xhr) => {
    if (xhr.lengthComputable) {
      const p = Math.round(xhr.loaded / xhr.total * 78);
      barFill.style.width = p + '%';
      barTxt.textContent  = `Đang tải... ${p}%`;
    }
  },
  (err) => {
    barTxt.textContent = '❌ Không tìm thấy Crime_Scene.glb — đặt 2 file cùng thư mục';
    barTxt.style.color = '#f55';
    console.error(err);
  }
);

// ── FPS State ────────────────────────────────────────────────────
const GRAVITY   = -14;
const JUMP_VEL  = 5.5;
const EYE_H     = 1.65;
let velY        = 0;
let onGround    = false;
let yaw         = 0;   // quay trái/phải
let pitch       = 0;   // nhìn lên/xuống

// ── Mouse: giữ trái kéo để nhìn ─────────────────────────────────
let lmbDown = false, mLastX = 0, mLastY = 0;

renderer.domElement.addEventListener('mousedown', (e) => {
  if (e.button !== 0) return;
  lmbDown = true;
  mLastX  = e.clientX;
  mLastY  = e.clientY;
  renderer.domElement.style.cursor = 'grabbing';
});
window.addEventListener('mouseup', (e) => {
  if (e.button !== 0) return;
  lmbDown = false;
  renderer.domElement.style.cursor = 'crosshair';
});
window.addEventListener('mousemove', (e) => {
  if (!lmbDown) return;
  yaw   -= (e.clientX - mLastX) * 0.003;
  pitch -= (e.clientY - mLastY) * 0.003;
  pitch  = Math.max(-1.4, Math.min(1.4, pitch));
  mLastX = e.clientX;
  mLastY = e.clientY;
});

// Double-click → Pointer Lock (optional chế độ game)
renderer.domElement.addEventListener('dblclick', () => {
  renderer.domElement.requestPointerLock();
});
document.addEventListener('pointerlockchange', () => {
  const locked = !!document.pointerLockElement;
  renderer.domElement.style.cursor = locked ? 'none' : 'crosshair';
});
document.addEventListener('mousemove', (e) => {
  if (!document.pointerLockElement) return;
  yaw   -= e.movementX * 0.002;
  pitch -= e.movementY * 0.002;
  pitch  = Math.max(-1.4, Math.min(1.4, pitch));
});

// ── Touch look (mobile) ──────────────────────────────────────────
let touchId = null, tLX = 0, tLY = 0;
const lz = document.getElementById('lookzone');
lz.addEventListener('touchstart', e => {
  if (touchId !== null) return;
  touchId = e.changedTouches[0].identifier;
  tLX = e.changedTouches[0].clientX;
  tLY = e.changedTouches[0].clientY;
}, { passive: true });
lz.addEventListener('touchmove', e => {
  for (const t of e.changedTouches) {
    if (t.identifier !== touchId) continue;
    yaw   -= (t.clientX - tLX) * 0.004;
    pitch -= (t.clientY - tLY) * 0.004;
    pitch  = Math.max(-1.4, Math.min(1.4, pitch));
    tLX = t.clientX; tLY = t.clientY;
  }
}, { passive: true });
lz.addEventListener('touchend', e => {
  for (const t of e.changedTouches) if (t.identifier === touchId) touchId = null;
}, { passive: true });

// ── Keyboard ────────────────────────────────────────────────────
const K = {};
document.addEventListener('keydown', (e) => {
  K[e.code] = true;
  if (e.code === 'Space') {
    e.preventDefault();
    if (onGround) { velY = JUMP_VEL; onGround = false; }
  }
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault();
});
document.addEventListener('keyup', (e) => { K[e.code] = false; });

// ── Speed ───────────────────────────────────────────────────────
const SPEEDS  = [4.0, 8.5, 1.5];
const SLABELS = ['🚶 NORMAL', '🏃 FAST', '🐢 SLOW'];
let sMode = 0;
document.getElementById('speed-btn').addEventListener('click', () => {
  sMode = (sMode + 1) % 3;
  document.getElementById('speed-btn').textContent = SLABELS[sMode];
});
window.addEventListener('wheel', e => {
  sMode = e.deltaY < 0 ? 1 : 0;
  document.getElementById('speed-btn').textContent = SLABELS[sMode];
}, { passive: true });

// ── D-pad ───────────────────────────────────────────────────────
const PAD = { 'btn-w':'KeyW', 'btn-s':'KeyS', 'btn-a':'KeyA', 'btn-d':'KeyD' };
for (const [id, code] of Object.entries(PAD)) {
  const el = document.getElementById(id);
  const on  = () => { K[code] = true;  el.classList.add('on'); };
  const off = () => { K[code] = false; el.classList.remove('on'); };
  el.addEventListener('mousedown',  on);
  el.addEventListener('touchstart', on,  { passive: true });
  el.addEventListener('mouseup',    off);
  el.addEventListener('touchend',   off, { passive: true });
  el.addEventListener('mouseleave', off);
}
const doJump = () => { if (onGround) { velY = JUMP_VEL; onGround = false; } };
document.getElementById('btn-jump').addEventListener('mousedown',  doJump);
document.getElementById('btn-jump').addEventListener('touchstart', doJump, { passive: true });

// ── Game Loop ────────────────────────────────────────────────────
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);

  // Apply rotation
  pivot.rotation.y  = yaw;
  camera.rotation.x = pitch;

  // ── Movement: dùng forward vector từ yaw ──
  // sin/cos của yaw cho hướng nhìn trên mặt phẳng XZ
  const s = Math.sin(yaw);   // trục X của hướng nhìn
  const c = Math.cos(yaw);   // trục Z của hướng nhìn

  // forward = (sin(yaw), 0, -cos(yaw))  — Three.js: -Z là trước
  // right   = (cos(yaw), 0,  sin(yaw))

  const fwd = (K['KeyW'] || K['ArrowUp'])    ? 1 : 0;
  const bck = (K['KeyS'] || K['ArrowDown'])  ? 1 : 0;
  const rgt = (K['KeyD'] || K['ArrowRight']) ? 1 : 0;
  const lft = (K['KeyA'] || K['ArrowLeft'])  ? 1 : 0;

  const moveF = fwd - bck;  // +1 tiến, -1 lùi
  const moveR = rgt - lft;  // +1 phải, -1 trái

  let dx =  s * moveF + c * moveR;
  let dz = -c * moveF + s * moveR;

  // Normalize diagonal
  const len = Math.sqrt(dx * dx + dz * dz);
  if (len > 0) {
    const sp = SPEEDS[sMode] * dt;
    pivot.position.x += (dx / len) * sp;
    pivot.position.z += (dz / len) * sp;
  }

  // Gravity & jump
  if (!onGround) velY += GRAVITY * dt;
  pivot.position.y += velY * dt;

  // Floor
  const floorLevel = FLOOR_Y + EYE_H;
  if (pivot.position.y <= floorLevel) {
    pivot.position.y = floorLevel;
    velY     = 0;
    onGround = true;
  }

  // Boundary
  if (window._BOX) {
    const b = window._BOX, m = 0.2;
    pivot.position.x = Math.max(b.min.x + m, Math.min(b.max.x - m, pivot.position.x));
    pivot.position.z = Math.max(b.min.z + m, Math.min(b.max.z - m, pivot.position.z));
  }

  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
